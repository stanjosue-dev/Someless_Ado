<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Download Challenge</title>
  <style>
    /* Reset basic margins */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* A colorful, modern gradient background */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      color: #333;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Neat and easy-to-read card layout */
    .card {
      background: #ffffff;
      padding: 50px;
      border-radius: 20px;
      text-align: center;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
    }

    h1 {
      font-size: 2.2rem;
      color: #11998e;
      margin-bottom: 15px;
    }

    p {
      font-size: 1.1rem;
      line-height: 1.6;
      color: #555;
      margin-bottom: 30px;
    }

    /* Styling the download button */
    .download-btn {
      display: inline-block;
      padding: 16px 32px;
      font-size: 1.2rem;
      font-weight: bold;
      color: #fff;
      background: #ff5e62;
      border-radius: 50px;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 8px 15px rgba(255, 94, 98, 0.3);
    }

    /* Hover effect for better user experience */
    .download-btn:hover {
      background: #ff9966;
      transform: translateY(-3px);
      box-shadow: 0 12px 20px rgba(255, 94, 98, 0.4);
    }
  </style>
</head>
<body>

  <main class="card">
    <h1>Challenge Completed!</h1>
    <p>This page features a clean design with all CSS contained in a single file. Click the button below to download a test file.</p>
    
    <a href="img/money.jpeg" 
       download="your_money.jpeg" 
       class="download-btn">
       Download Test File
    </a>
  </main>

</body>
</html>
