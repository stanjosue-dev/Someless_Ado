<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Video Player</title>
    <style>
        /* This styles the page to look like a modern online theater */
        body {
            margin: 0;
            padding: 0;
            background-color: #121212; /* Dark background */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
        }

        .video-container {
            width: 90%;
            max-width: 800px;
            background: #000;
            border-radius: 10px;
            box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.8);
            overflow: hidden; /* Keeps the rounded corners neat */
        }

        video {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <!-- 
          controls: Shows play/pause/volume
          autoplay: Starts playing immediately when the page loads
          muted: Required by most browsers to allow autoplay
          playsinline: Forces mobile browsers to play inside the page instead of fullscreen
          controlsList="nodownload": Removes the download button from the controls
          oncontextmenu="return false;": Disables right-clicking so they can't click "Save Video As..."
        -->
        <video 
            controls 
            autoplay 
            muted 
            playsinline 
            controlsList="nodownload" 
            oncontextmenu="return false;"
            loop
        >
            <source src="media/vid.mp4" type="video/mp4">
            
            Your browser does not support the video tag.
        </video>
    </div>

</body>
</html>
